spring:
  application:
    name: sneak_shop
  datasource:
    url: jdbc:h2:mem:sneak_shop;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    secret: "sneak-shop-local-development-secret-key-change-me"
    expiration-minutes: 1440
