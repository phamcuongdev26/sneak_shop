---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:mem:sneak_shop;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

---
spring:
  config:
    activate:
      on-profile: test
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false

logging:
  level:
    org.hibernate.tool.schema: ERROR

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
