    activate:
      on-profile: dev
  datasource:
    url: jdbc:mysql://localhost:3306/sneak_shop?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
    driver-class-name: com.mysql.cj.jdbc.Driver
